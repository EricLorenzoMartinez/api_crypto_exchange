name: Crypto API CI/CD Pipeline

# When do we want to run this pipeline?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # What operating system does the agent use?
    runs-on: ubuntu-latest

    steps:
    # --------------------------------------
    # CI
    # ---------------------------------------
    # 1. Agent downloads the repository code to work with it
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Agent installs pnpm to manage dependencies
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    # 3. Agent installs Node.js and tells it to cache pnpm for faster execution
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    # 4. Agent installs dependencies (the equivalent of pnpm i)
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # 5. Agent runs the linter (you have eslint.config.mjs)
    - name: Run ESLint
      run: pnpm run lint

    # 6. Agent compiles TypeScript to JavaScript
    - name: Build TypeScript
      run: pnpm run build

    # --------------------------------------
    # CD
    # --------------------------------------
    # Prepare the agent to build advanced Docker images
    - name: Set up Docker Buildx
      if: github.event_name == 'push' # Only set up Buildx for push events, not for pull requests
      uses: docker/setup-buildx-action@v2

    # Agent does login to Docker Hub
    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Agent builds and pushes the Docker image to Docker Hub
    - name: Build and push Docker image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v3
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/crypto-api:latest